      value: "/[\u0590-\u05FF]/.test(output)"
    - type: contains
      value: "פרויקט"
    - type: javascript
      value: "output.includes('מתקדם') || output.includes('שלב')"
    - type: javascript
      value: "output.length > 0"

- description: "Hebrew enumerated list"
  vars:
    input: "יש שלושה דברים שצריך לעשות ראשית לעדכן את המסמכים שנית לתקן את הבדיקות שלישית לבצע פריסה"
  options:
