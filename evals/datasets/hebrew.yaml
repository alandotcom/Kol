# Hebrew ASR Post-Processing Test Cases
# Run: npx promptfoo eval --tests datasets/hebrew.yaml --prompts prompts/hebrew-general.txt

# =============================================================================
# General Cleanup
# =============================================================================

- description: "Hebrew filler removal"
  vars:
    input: "אה אני רוצה לקנות אה שלושה תפוחים"
  options:
    prompt:
      raw: file://prompts/hebrew-general.txt
  assert:
    - type: not-contains
      value: "אה "
    - type: javascript
      value: "/[\u0590-\u05FF]/.test(output)"
    - type: contains
      value: "תפוחים"
    - type: contains
      value: "שלושה"
    - type: javascript
      value: "output.length > 0"

- description: "Hebrew punctuation"
  vars:
    input: "מה שלומך היום רציתי לשאול אותך משהו"
  options:
    prompt:
      raw: file://prompts/hebrew-general.txt
  assert:
    - type: javascript
      value: "/[\u0590-\u05FF]/.test(output)"
    - type: contains
      value: "?"
    - type: contains
      value: "שלומך"
    - type: contains
      value: "לשאול"

- description: "Hebrew compound words"
  vars:
    input: "אני לומד בבית ספר על ידי מורה טוב"
  options:
    prompt:
      raw: file://prompts/hebrew-general.txt
  assert:
    - type: javascript
      value: "/[\u0590-\u05FF]/.test(output)"
    - type: javascript
      value: "output.includes('בית') && output.includes('ספר')"
    - type: javascript
      value: "output.includes('על') && output.includes('ידי')"
    - type: javascript
      value: "output.length > 0"

- description: "Hebrew comprehensive fillers"
  vars:
    input: "אממ ככה אז אהה אני חושב שזה רעיון טוב"
  options:
    prompt:
      raw: file://prompts/hebrew-general.txt
  assert:
    - type: not-contains
      value: "אממ"
    - type: not-contains
      value: "אהה"
    - type: javascript
      value: "/[\u0590-\u05FF]/.test(output)"
    - type: contains
      value: "רעיון טוב"

- description: "Hebrew numbers"
  vars:
    input: "יש לי שלוש פגישות ב 15 לחודש"
  options:
    prompt:
      raw: file://prompts/hebrew-general.txt
  assert:
    - type: javascript
      value: "/[\u0590-\u05FF]/.test(output)"
    - type: contains
      value: "פגישות"
    - type: contains
      value: "15"
    - type: javascript
      value: "output.length > 0"

- description: "Hebrew short - yes"
  vars:
    input: "כן"
  options:
    prompt:
      raw: file://prompts/hebrew-general.txt
  assert:
    - type: javascript
      value: "/[\u0590-\u05FF]/.test(output)"
    - type: javascript
      value: "output.trim() === 'כן' || output.trim() === 'כן.'"

- description: "Hebrew short - okay"
  vars:
    input: "בסדר"
  options:
    prompt:
      raw: file://prompts/hebrew-general.txt
  assert:
    - type: javascript
      value: "/[\u0590-\u05FF]/.test(output)"
    - type: javascript
      value: "output.trim() === 'בסדר' || output.trim() === 'בסדר.'"

- description: "Hebrew question"
  vars:
    input: "אתה חושב שאנחנו צריכים ללכת עם אופציה א או אופציה ב"
  options:
    prompt:
      raw: file://prompts/hebrew-general.txt
  assert:
    - type: contains
      value: "?"
    - type: javascript
      value: "/[\u0590-\u05FF]/.test(output)"
    - type: contains
      value: "אופציה"

- description: "Hebrew formal register"
  vars:
    input: "אני מבקש להודיע כי הפרויקט מתקדם כמתוכנן"
  options:
    prompt:
      raw: file://prompts/hebrew-general.txt
  assert:
    - type: javascript
      value: "/[\u0590-\u05FF]/.test(output)"
    - type: contains
      value: "פרויקט"
    - type: javascript
      value: "output.includes('כמתוכנן') || output.includes('מתקדם')"
    - type: javascript
      value: "output.length > 0"

- description: "Hebrew colloquial"
  vars:
    input: "אחי מה קורה היום אתה בא לאכול משהו"
  options:
    prompt:
      raw: file://prompts/hebrew-general.txt
  assert:
    - type: javascript
      value: "/[\u0590-\u05FF]/.test(output)"
    - type: contains
      value: "?"
    - type: javascript
      value: "output.includes('אחי') || output.includes('מה קורה')"

- description: "Hebrew slang - mami preserved, not corrected to ima"
  vars:
    input: "היי מאמי מה קורה"
  options:
    prompt:
      raw: file://prompts/hebrew-messaging.txt
  assert:
    - type: javascript
      value: "/[\u0590-\u05FF]/.test(output)"
    - type: contains
      value: "מאמי"
    - type: not-contains
      value: "אמא"
    - type: javascript
      value: "!output.match(/(?<!מ)אמי/)"
    - type: javascript
      value: "output.includes('מה קורה')"

- description: "Hebrew slang - Arabic loanwords preserved"
  vars:
    input: "יאללה חביבי אחלה שנגיע בזמן"
  options:
    prompt:
      raw: file://prompts/hebrew-messaging.txt
  assert:
    - type: javascript
      value: "/[\u0590-\u05FF]/.test(output)"
    - type: contains
      value: "יאללה"
    - type: contains
      value: "חביבי"
    - type: contains
      value: "אחלה"

- description: "Hebrew slang - Yiddish and idioms mix"
  vars:
    input: "נו תכלס בלאגן פה בואי נזרום"
  options:
    prompt:
      raw: file://prompts/hebrew-messaging.txt
  assert:
    - type: javascript
      value: "/[\u0590-\u05FF]/.test(output)"
    - type: contains
      value: "תכלס"
    - type: contains
      value: "בלאגן"
    - type: javascript
      value: "output.includes('נזרום') || output.includes('לזרום')"

# =============================================================================
# Code-Switching (Hebrew + English)
# =============================================================================

- description: "Tech terms in Hebrew context - deploy"
  vars:
    input: "אני צריך לעשות deploy ל production"
  options:
    prompt:
