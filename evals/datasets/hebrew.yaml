    input: "אחי מה קורה אני אהיה שם בעוד 10 דקות"
  options:
    prompt:
      raw: file://prompts/hebrew-messaging.txt
  assert:
    - type: javascript
      value: "/[\u0590-\u05FF]/.test(output)"
    - type: javascript
      value: "output.includes('10') || output.includes('עשר')"
    - type: contains
      value: "דקות"

- description: "Hebrew WhatsApp style"
  vars:
    input: "הי כן ראיתי את ההודעה שלך"
  options:
    prompt:
      raw: file://prompts/hebrew-messaging.txt
  assert:
    - type: javascript
      value: "/[\u0590-\u05FF]/.test(output)"
    - type: javascript
      value: "output.includes('ראיתי') || output.includes('הודעה')"

- description: "Hebrew short - sababa"
  vars:
    input: "סבבה"
  options:
    prompt:
      raw: file://prompts/hebrew-messaging.txt
  assert:
    - type: javascript
      value: "/[\u0590-\u05FF]/.test(output)"
    - type: javascript
      value: "output.trim() === 'סבבה' || output.trim() === 'סבבה.' || output.trim() === 'סבבה!'"

- description: "Hebrew question - when arriving"
  vars:
    input: "מתי אתה מגיע הערב"
  options:
    prompt:
      raw: file://prompts/hebrew-messaging.txt
  assert:
    - type: contains
