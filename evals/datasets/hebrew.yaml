- description: "Git commands in Hebrew"
  vars:
    input: "תעשה commit ואחרי זה push ל main"
  options:
    prompt:
      raw: file://prompts/hebrew-code.txt
  assert:
    - type: contains
      value: "commit"
    - type: contains
      value: "push"
    - type: contains
      value: "main"
    - type: javascript
      value: "/[\u0590-\u05FF]/.test(output)"

- description: "API endpoint in Hebrew"
  vars:
    input: "ה endpoint הוא slash api slash users"
  options:
    prompt:
      raw: file://prompts/hebrew-code.txt
  assert:
    - type: javascript
      value: "/[\u0590-\u05FF]/.test(output)"
    - type: contains
      value: "/api/users"
    - type: not-contains
      value: " slash "

- description: "Null vs undefined in Hebrew"
  vars:
    input: "ה function הזה מחזיר null במקום undefined"
  options:
    prompt:
      raw: file://prompts/hebrew-code.txt
  assert:
    - type: contains
      value: "null"
    - type: contains
      value: "undefined"
    - type: javascript
      value: "/[\u0590-\u05FF]/.test(output)"

- description: "PR and merge in Hebrew"
  vars:
    input: "אני צריך לבדוק את ה pull request לפני ה merge"
  options:
    prompt:
      raw: file://prompts/hebrew-code.txt
  assert:
    - type: contains
      value: "pull request"
    - type: contains
      value: "merge"
    - type: javascript
      value: "/[\u0590-\u05FF]/.test(output)"

- description: "Variable name in Hebrew"
  vars:
    input: "שנה את ה max retries ל 5"
  options:
    prompt:
      raw: file://prompts/hebrew-code.txt
  assert:
    - type: javascript
      value: "/[\u0590-\u05FF]/.test(output)"
    - type: javascript
      value: "output.includes('max retries') || output.includes('maxRetries') || output.includes('MAX_RETRIES') || output.includes('max_retries')"
    - type: contains
      value: "5"

# =============================================================================
# Hebrew Messaging
# =============================================================================

- description: "Hebrew casual messaging"
