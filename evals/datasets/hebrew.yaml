  assert:
    - type: javascript
      value: "/[\u0590-\u05FF]/.test(output)"
    - type: contains
      value: "מסמכים"
    - type: contains
      value: "בדיקות"
    - type: contains
      value: "פריסה"

- description: "Hebrew email closing"
  vars:
    input: "תודה על עזרתך אנא עדכן אותי אם תצטרך משהו נוסף"
  options:
    prompt:
      raw: file://prompts/hebrew-general.txt
  assert:
    - type: javascript
      value: "/[\u0590-\u05FF]/.test(output)"
    - type: contains
      value: "תודה"
    - type: javascript
      value: "output.length > 0"

- description: "Hebrew meeting decisions"
  vars:
    input: "החלטות מהישיבה אחת לאשר את התקציב שתיים לגייס שני מהנדסים"
  options:
    prompt:
      raw: file://prompts/hebrew-general.txt
  assert:
    - type: javascript
      value: "/[\u0590-\u05FF]/.test(output)"
    - type: contains
      value: "תקציב"
    - type: contains
      value: "מהנדסים"

- description: "Hebrew budget report"
  vars:
    input: "בהתייחס לשאלתך לגבי התקציב הקצינו חמישים אלף לרבעון הראשון"
  options:
    prompt:
      raw: file://prompts/hebrew-general.txt
  assert:
    - type: javascript
      value: "/[\u0590-\u05FF]/.test(output)"
    - type: javascript
      value: "output.includes('הקצינו') || output.includes('תקציב')"
    - type: javascript
      value: "output.includes('חמישים אלף') || output.includes('50,000') || output.includes('50000')"
    - type: javascript
      value: "output.length > 0"
