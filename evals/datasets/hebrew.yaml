    - type: javascript
      value: "/[\u0590-\u05FF]/.test(output)"
    - type: javascript
      value: "output.includes('מגיע') || output.includes('מתי')"

- description: "Hebrew group chat"
  vars:
    input: "מי בא לארוחת ערב היום רק אנחנו או גם דני"
  options:
    prompt:
      raw: file://prompts/hebrew-messaging.txt
  assert:
    - type: contains
      value: "?"
    - type: javascript
      value: "/[\u0590-\u05FF]/.test(output)"
    - type: contains
      value: "דני"
    - type: javascript
      value: "output.includes('ארוחת ערב') || output.includes('ארוחה')"

# =============================================================================
# Hebrew Document
# =============================================================================

- description: "Hebrew formal document"
  vars:
    input: "הריני להודיעכם כי הפרויקט בשלב מתקדם"
  options:
    prompt:
      raw: file://prompts/hebrew-general.txt
  assert:
